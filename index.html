<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<title>
双色球智能分析系统
</title>


<link rel="stylesheet" href="/static/style.css">


</head>


<body>


<div class="顶部">

<h1>
🎯 双色球智能分析系统
</h1>

<p>
历史数据分析 · 综合评分 · 娱乐参考
</p>

</div>



<div class="菜单">

<a href="/">
首页
</a>

<a>
开奖数据
</a>

<a>
添加历史数据
</a>

<a>
添加开奖期数
</a>

<a>
号码分析
</a>

<a>
评分设置
</a>

<a>
系统说明
</a>


</div>




<div class="容器">


<!-- 数据统计 -->

<div class="卡片">


<h2>
📊 数据统计
</h2>


<p>

历史开奖：

<b>
{{总期数}}
</b>

期

</p>



<p>

最新期号：

<b>

{{最新.期号}}

</b>


</p>



<p>

开奖日期：

<b>

{{最新.日期}}

</b>


</p>


</div>






<!-- 最新号码 -->

<div class="卡片">


<h2>
🎯 最新开奖号码
</h2>


<p>
红球：
</p>


<div>


{% for n in 最新.红球 %}


<span class="红球">

{{"%02d"|format(n)}}

</span>


{% endfor %}


</div>



<p>

蓝球：

</p>



<span class="蓝球">

{{"%02d"|format(最新.蓝球)}}

</span>



</div>







<!-- 系统说明 -->


<div class="卡片">


<h2>

📌 系统说明

</h2>


<p>

本系统用于双色球历史开奖数据统计分析。

</p>


<p>

开奖结果具有随机性。

</p>


<p>

评分结果仅供娱乐参考。

</p>


</div>



</div>



</body>


</html>
